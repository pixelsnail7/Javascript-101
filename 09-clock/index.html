<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='stylesheet' href='./styles/style.css'>
    <title>clock</title>
</head>
<body>
    <main>
        <section id="clock">
            <div id="time">
                <span id="hours">01</span>
                <span>:</span>
                <span id="minutes">01</span>
                <span>:</span>
                <span id="seconds">01</span>
                <span id="ampm">AM</span>
            </div>
            <div id="date">
                <span id="day">01</span>
                <span>/</span>
                <span id="month">01</span>
                <span>/</span>
                <span id="year">2026</span>
            </div>
        </section>
    </main>
    <script type='module' src='./javascript/app.js'></script>
</body>
</html>
