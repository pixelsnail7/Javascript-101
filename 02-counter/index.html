<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css' integrity='sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==' crossorigin='anonymous' referrerpolicy='no-referrer' />
    <link rel='stylesheet' href='./styles/style.css'>
    <title>Counter</title>
</head>
<body>
    <main>
        <div id="meter"></div>
        <div id="counter">
            <div id="display">000</div>
            <div id="buttons">
                <button id="increaseBtn"><i class="fa-solid fa-plus"></i></button>
                <button id="resetBtn"><i class="fa-solid fa-arrows-rotate"></i></button>
                <button id="decreaseBtn"><i class="fa-solid fa-minus"></i></button>
            </div>
        </div>
        <div id="hook"></div>
        <menu>
            <button id="plusBtn"><i class="fa-solid fa-plus"></i></button>
            <div id ="countDisplay">01</div>
            <button id="minusBtn"><i class="fa-solid fa-minus"></i></button>
        </menu>
    </main>
    <script type='module' src='./javascript/app.js'></script>
</body>
</html>
